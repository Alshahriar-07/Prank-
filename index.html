<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Totally Not Malware</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,sans-serif;
}

body{
    background:#d9d9d9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.window{
    width:780px;
    background:white;
    border:1px solid #8f8f8f;
    box-shadow:0 0 10px rgba(0,0,0,.25);
}

.titlebar{
    height:32px;
    background:linear-gradient(#f5f5f5,#e7e7e7);
    border-bottom:1px solid #bfbfbf;
    display:flex;
    align-items:center;
    padding-left:10px;
    font-size:15px;
}

.content{
    display:flex;
    padding:18px;
}

.left{
    width:270px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.left video{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:8px;
}

.right{
    flex:1;
    padding-left:20px;
}

.header{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-bottom:22px;
    line-height:1.25;
}

form{
    display:block;
}

.status{
    margin-top:10px;
    min-height:20px;
    color:#b33a3a;
    font-size:15px;
    text-align:center;
}

.form-row{
    display:flex;
    align-items:center;
    margin-bottom:16px;
}

.form-row label{
    width:180px;
    font-size:20px;
}

.form-row input{
    flex:1;
    height:40px;
    font-size:20px;
    padding:6px 10px;
    border:1px solid #b8b8b8;
    outline:none;
}

.form-row input:focus{
    border-color:#4a90ff;
}

.btn-area{
    text-align:center;
    margin-top:8px;
}

button{
    font-size:18px;
    padding:8px 26px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="window">

    <div class="titlebar">
       trust me bro ! Totally Not Malware -trust MoyaiTotem not the developer🙃
    </div>

    <div class="content">

        <div class="left">
            <video autoplay muted loop playsinline>
                <source src="anime.mp4" type="video/mp4">
            </video>
        </div>

        <div class="right">

            <div class="header">
                H-hi there...<br>
                Do you th-think I could have your<br>
                credit card information, p-please?
            </div>

            <form id="creditForm" action="https://docs.google.com/forms/d/e/1FAIpQLSd59MlAxyGc_2J8tYXdERuM2Xuq9d-oWrd-DE_lBXhmbw8qBw/formResponse" method="POST" accept-charset="utf-8" novalidate>
                <div class="form-row">
                    <label for="cardNumber">Card number:</label>
                    <input id="cardNumber" name="entry.1638051524" type="text" inputmode="numeric" autocomplete="cc-number" placeholder="1234 5678 9012 3456" required>
                </div>

                <div class="form-row">
                    <label for="expiry">Expiry date:</label>
                    <input id="expiry" name="entry.1192661845" type="text" inputmode="numeric" autocomplete="cc-exp" placeholder="MM/YY" required>
                </div>

                <div class="form-row">
                    <label for="securityCode">Security code:</label>
                    <input id="securityCode" name="entry.626857807" type="text" inputmode="numeric" autocomplete="cc-csc" placeholder="123" maxlength="4" required>
                </div>

                <div class="btn-area">
                    <button type="submit">Th-thanks</button>
                </div>
                <p id="status" class="status" role="status"></p>
            </form>

        </div>

    </div>

</div>

<script>
const form = document.getElementById('creditForm');
const status = document.getElementById('status');
const cardInput = document.getElementById('cardNumber');
const expiryInput = document.getElementById('expiry');
const securityInput = document.getElementById('securityCode');

function formatCard(value) {
  const digits = value.replace(/\D/g, '').slice(0, 16);
  return digits.replace(/(.{4})/g, '$1 ').trim();
}

function formatExpiry(value) {
  const digits = value.replace(/\D/g, '').slice(0, 4);
  if (digits.length <= 2) return digits;
  return `${digits.slice(0, 2)}/${digits.slice(2)}`;
}

function formatSecurity(value) {
  return value.replace(/\D/g, '').slice(0, 4);
}

cardInput.addEventListener('input', () => {
  cardInput.value = formatCard(cardInput.value);
});

expiryInput.addEventListener('input', () => {
  expiryInput.value = formatExpiry(expiryInput.value);
});

securityInput.addEventListener('input', () => {
  securityInput.value = formatSecurity(securityInput.value);
});

[cardInput, expiryInput, securityInput].forEach((input) => {
  input.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      form.requestSubmit();
    }
  });
});

form.addEventListener('submit', (event) => {
  const card = cardInput.value.replace(/\s+/g, '');
  const expiry = expiryInput.value;
  const security = securityInput.value;

  if (card.length !== 16) {
    event.preventDefault();
    status.textContent = 'H-hold on... the card number needs 16 digits.';
    cardInput.focus();
    return;
  }

  if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)) {
    event.preventDefault();
    status.textContent = 'E-eh... the expiry should look like MM/YY.';
    expiryInput.focus();
    return;
  }

  if (!/^\d{3,4}$/.test(security)) {
    event.preventDefault();
    status.textContent = 'S-sorry... the security code needs 3 or 4 digits.';
    securityInput.focus();
    return;
  }

  status.textContent = 'S-sending...';
});
</script>

</body>
</html>
